name: Feishu Bot

on:
  schedule:
    # 每 10 分钟运行一次（GitHub Actions cron 最短 5 分钟，但 10 分钟更省额度）
    - cron: '*/10 * * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: actions_state.json
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Run bot
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          FEISHU_SHUSHU_OPEN_ID: ${{ secrets.FEISHU_SHUSHU_OPEN_ID }}
          FEISHU_SANGE_OPEN_ID: ${{ secrets.FEISHU_SANGE_OPEN_ID }}
          GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GITHUB_PRIVATE_REPOS: ${{ secrets.GITHUB_PRIVATE_REPOS }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-chat
        run: python actions_runner.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: actions_state.json
          key: bot-state-${{ github.run_id }}
