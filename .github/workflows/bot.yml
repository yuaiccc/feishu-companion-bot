name: Feishu Companion Bot

on:
  schedule:
    # Every 5 minutes as fallback when local server is offline
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Persist the GitHub event dedup state (memory_data/<profile>/state.json)
      # across runs. Without this, every Actions run starts with an empty state
      # and re-pushes all GitHub events as new.
      - name: Restore GitHub state
        uses: actions/cache@v4
        with:
          path: memory_data
          key: gh-state-${{ github.run_id }}
          restore-keys: |
            gh-state-

      - name: Build bot binary
        run: go build -o bot ./cmd/bot

      - name: Run GitHub Actions entry
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          FEISHU_BOT_OPEN_ID: ${{ secrets.FEISHU_BOT_OPEN_ID }}
          FEISHU_OWNER_OPEN_ID: ${{ secrets.FEISHU_OWNER_OPEN_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_PRIVATE_REPOS: ${{ secrets.GH_PRIVATE_REPOS }}
          DRY_RUN: "false"
        run: ./bot --actions

      - name: Save GitHub state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: memory_data
          key: gh-state-${{ github.run_id }}
